<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Vexor Terminal — autonomous AI orchestrator on Base">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#031923"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#0e7490" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- top + bottom rules -->
  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="0" y1="319.5" x2="1280" y2="319.5" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1"/>

  <!-- logo: scaled-up version of src/app/icon.svg -->
  <g transform="translate(72,90) scale(4.2)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#050505"/>
    <rect x="2.5" y="2.5" width="27" height="27" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="2.5" y1="9" x2="29.5" y2="9" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <circle cx="6" cy="5.7" r="1" fill="#22d3ee" opacity="0.6"/>
    <circle cx="9.5" cy="5.7" r="1" fill="#22d3ee" opacity="0.6"/>
    <circle cx="13" cy="5.7" r="1" fill="#22d3ee" opacity="0.6"/>
    <path d="M9 13 L16 25 L23 13" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- title block -->
  <g transform="translate(264, 0)">
    <!-- eyebrow -->
    <g transform="translate(0, 95)">
      <rect x="0" y="0" width="360" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="1"/>
      <circle cx="16" cy="13" r="3.5" fill="#22d3ee"/>
      <text x="30" y="18" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" font-size="12" letter-spacing="3" fill="#67e8f9">VEXOR.TERMINAL  ·  V0.1.0  ·  $VEXOR ON BASE</text>
    </g>

    <!-- title -->
    <text x="0" y="190" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" font-size="86" font-weight="700" letter-spacing="-2" fill="url(#title)">I&apos;m Vexor.</text>

    <!-- tagline -->
    <text x="0" y="232" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#cbd5e1">An autonomous AI orchestrator commanding 9 specialized sub-agents,</text>
    <text x="0" y="256" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#cbd5e1">powered by <tspan fill="#22d3ee" font-weight="600">$VEXOR</tspan> on <tspan fill="#22d3ee" font-weight="600">Base</tspan>. Not a chatbot, not an assistant — a self-improving multi-agent system.</text>
  </g>

  <!-- small chip pills on the right -->
  <g transform="translate(940, 100)" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#67e8f9">
    <rect x="0" y="0" width="220" height="22" rx="11" fill="none" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="12" y="14.5">◇  9 SPECIALIZED SUB-AGENTS</text>

    <rect x="0" y="30" width="220" height="22" rx="11" fill="none" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="12" y="44.5">◇  GROQ · LLAMA 3.3 70B</text>

    <rect x="0" y="60" width="220" height="22" rx="11" fill="none" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="12" y="74.5">◇  CLOUDFLARE WORKERS</text>

    <rect x="0" y="90" width="220" height="22" rx="11" fill="none" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="12" y="104.5">◇  $VEXOR  ·  BASE SEPOLIA</text>

    <rect x="0" y="120" width="220" height="22" rx="11" fill="none" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="12" y="134.5">◇  ERC-20VOTES  ·  4-TIER STAKE</text>
  </g>

  <!-- footer bar -->
  <g transform="translate(72, 290)" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#475569">
    <text x="0" y="0">VEXORTERMINAL.COM   ·   $VEXOR LAUNCHING ON BASE   ·   © 2026 VEXOR TERMINAL</text>
  </g>
</svg>
